<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deepedu.school — 家庭教育 AI 助手</title>
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --bg: #f8fafc;
  --card: #fff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -2px rgba(0,0,0,.04);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* ── Layout ── */
.app { display: flex; height: 100vh; }
.sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.logo { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.logo h1 { font-size: 20px; color: var(--primary); }
.logo span { font-size: 12px; color: var(--text-secondary); }

.nav { flex: 1; padding: 12px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all .15s; font-size: 14px; color: var(--text-secondary); border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover, .nav-item.active { background: #eff6ff; color: var(--primary); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.user-info { padding: 16px 24px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }

/* ── Main Content ── */
.header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--card); display: flex; justify-content: space-between; align-items: center; }
.header h2 { font-size: 18px; }
.badge { background: #dbeafe; color: var(--primary); padding: 2px 10px; border-radius: 20px; font-size: 12px; }

.content { padding: 24px; overflow-y: auto; height: calc(100vh - 57px); }

/* ── Cards ── */
.card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

/* ── Chat ── */
.chat-container { display: flex; flex-direction: column; height: 100%; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
.chat-msg { margin-bottom: 12px; display: flex; gap: 10px; }
.chat-msg.user { flex-direction: row-reverse; }
.chat-msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.chat-msg.assistant .avatar { background: #dbeafe; color: var(--primary); }
.chat-msg.user .avatar { background: var(--primary); color: #fff; }
.chat-msg .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.chat-msg.assistant .bubble { background: #f1f5f9; }
.chat-msg.user .bubble { background: var(--primary); color: #fff; }
.chat-msg .bubble h2, .chat-msg .bubble h3 { margin-bottom: 6px; }
.chat-msg .bubble p { margin: 4px 0; }

.chat-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); background: var(--card); }
.chat-input input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
.chat-input input:focus { border-color: var(--primary); }
.chat-input button { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.chat-input button:hover { background: var(--primary-dark); }
.skill-bar { padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.skill-tag { padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .15s; background: #fff; }
.skill-tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ── Knowledge Map ── */
.map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.map-node { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; cursor: pointer; transition: all .15s; }
.map-node:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
.map-node .node-icon { font-size: 28px; margin-bottom: 6px; }
.map-node .node-title { font-size: 13px; font-weight: 600; }
.map-node .node-grade { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.map-node .mastery-bar { margin-top: 8px; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
.map-node .mastery-bar .fill { height: 100%; background: var(--success); transition: width .3s; }

/* ── English ── */
.course-card { border-left: 3px solid var(--primary); padding-left: 16px; }
.course-level { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 4px; }

/* ── TV Mode ── */
.tv-mode .sidebar { display: none; }
.tv-mode .header { display: none; }
.tv-mode .content { padding: 40px 60px; height: 100vh; }
.tv-mode .card { padding: 32px; margin-bottom: 24px; }
.tv-mode .chat-messages { font-size: 20px; }
.tv-mode .chat-msg .bubble { font-size: 18px; padding: 16px 20px; }
.tv-mode .chat-input input { font-size: 18px; padding: 14px 18px; }
.tv-mode .chat-input button { font-size: 18px; padding: 14px 28px; }
.tv-mode .skill-tag { font-size: 16px; padding: 8px 18px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .content { padding: 12px; }
}

/* ── Markdown in chat ── */
.bubble code { background: rgba(0,0,0,.06); padding: 1px 4px; border-radius: 3px; font-size: .9em; }
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <h1>🧠 deepedu.school</h1>
      <span>家庭教育 AI 助手</span>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        AI 对话
      </button>
      <button class="nav-item" data-view="knowledge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        知识图谱
      </button>
      <button class="nav-item" data-view="english">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        英语课程
      </button>
      <button class="nav-item" data-view="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        学习进度
      </button>
      <button class="nav-item" id="tvModeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        TV 模式
      </button>
      <button class="nav-item" id="downloadTvBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 TV 版
      </button>
    </nav>
    <div class="user-info">
      算力一体机 ¥2,999 买断
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="header">
      <h2 id="viewTitle">AI 对话辅导</h2>
      <span class="badge" id="statusBadge">在线</span>
    </div>
    <div class="content" id="viewContent"></div>
  </main>
</div>

<script>
// ── State ──
const API = '/api';
let currentView = 'chat';
let currentSkill = 'math';
let chatHistory = [];

// ── Views ──
const views = {
  chat: () => `
    <div class="chat-container">
      <div class="skill-bar" id="skillBar">
        <span class="skill-tag active" data-skill="math">🧮 数学辅导</span>
        <span class="skill-tag" data-skill="english">🔤 英语听说</span>
        <span class="skill-tag" data-skill="compose">✍️ 作文批改</span>
        <span class="skill-tag" data-skill="quiz">📝 自适应测评</span>
        <span class="skill-tag" data-skill="oral">🗣️ 口算练习</span>
        <span class="skill-tag" data-skill="dictation">👂 听写训练</span>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg assistant">
          <div class="avatar">DT</div>
          <div class="bubble">
            <strong>DeepTutor</strong>：你好！我是你的 AI 辅导老师。<br>
            选择上方的学习技能，然后输入你的问题，我会一步步帮你解答。<br><br>
            试试这些：<br>
            • 数学：鸡兔同笼 35 头 94 脚<br>
            • 数学：3x + 5 = 20<br>
            • 数学：正方形边长 8 求面积<br>
            • 英语：apple 是什么意思
          </div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">发送</button>
      </div>
    </div>`,

  knowledge: () => `<div class="card"><h3>知识图谱</h3><p style="color:var(--text-secondary)">加载中...</p></div><div class="map-grid" id="mapGrid"></div>`,

  english: () => `<div class="card"><h3>英语课程体系</h3><p style="color:var(--text-secondary)">7 级渐进，从字母到写作</p></div><div id="englishCourses"></div>`,

  progress: () => `<div class="card"><h3>学习进度</h3><p style="color:var(--text-secondary)">BKT 知识追踪，实时掌握学习状态</p></div><div id="progressContent"></div>`
};

// ── Render ──
function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('viewTitle').textContent = {
    chat: 'AI 对话辅导', knowledge: '知识图谱', english: '英语课程', progress: '学习进度'
  }[view] || '';
  document.getElementById('viewContent').innerHTML = views[view] ? views[view]() : '';
  if (view === 'chat') bindSkillBar();
  if (view === 'knowledge') loadKnowledge();
  if (view === 'english') loadEnglish();
  if (view === 'progress') loadProgress();
}

// ── Chat ──
function bindSkillBar() {
  document.querySelectorAll('#skillBar .skill-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.querySelectorAll('#skillBar .skill-tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      currentSkill = tag.dataset.skill;
    });
  });
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  appendMessage('user', msg);

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, skill_type: currentSkill, grade: 'grade-4', history: chatHistory.slice(-10) })
    });
    const data = await res.json();
    appendMessage('assistant', data.answer);
    chatHistory.push({ role: 'user', content: msg });
    chatHistory.push({ role: 'assistant', content: data.answer });
    document.getElementById('statusBadge').textContent = data.source === 'local' ? '本地引擎' : data.source === 'siliconflow' ? '云端推理' : '离线模式';
  } catch(e) {
    appendMessage('assistant', '网络连接失败，请检查后端服务是否运行。');
  }
}

function appendMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const avatar = role === 'assistant' ? 'DT' : '你';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${md2html(text)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function md2html(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)/gm, '<h3>$1</h3>')
    .replace(/^## (.+)/gm, '<h2>$1</h2>')
    .replace(/^# (.+)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>')
    .replace(/✓/g, '<span style="color:#10b981">✓</span>');
}

// ── Knowledge ──
async function loadKnowledge() {
  const res = await fetch(`${API}/knowledge`);
  const data = await res.json();
  const grid = document.getElementById('mapGrid');
  grid.innerHTML = data.nodes.map(n => `
    <div class="map-node" onclick="navigate('chat');setTimeout(()=>{document.getElementById('chatInput').value='${n.title} 练习题';document.getElementById('chatInput').focus()},200)">
      <div class="node-icon">${n.subject === 'math' ? '🔢' : '🔤'}</div>
      <div class="node-title">${n.title}</div>
      <div class="node-grade">${n.grade} · 难度 ${'⭐'.repeat(n.difficulty)}</div>
      <div class="mastery-bar"><div class="fill" style="width:${Math.random()*60+20}%"></div></div>
    </div>
  `).join('');
}

// ── English ──
async function loadEnglish() {
  const res = await fetch(`${API}/courses/english`);
  const data = await res.json();
  document.getElementById('englishCourses').innerHTML = data.courses.map(c => `
    <div class="card course-card">
      <div class="course-level">Level ${c.level}</div>
      <h3>${c.title}</h3>
      <p style="color:var(--text-secondary);margin-top:6px">${c.content}</p>
      <p style="margin-top:8px;font-size:13px">💡 ${c.tips}</p>
    </div>
  `).join('');
}

// ── Progress ──
async function loadProgress() {
  const res = await fetch(`${API}/bkt/state`);
  const data = await res.json();
  const states = data.states;
  let html = '<div class="card-grid">';
  for (const [id, p] of Object.entries(states).slice(0, 6)) {
    html += `<div class="card"><strong>${id}</strong><div class="mastery-bar" style="margin-top:8px;height:8px"><div class="fill" style="width:${p*100}%"></div></div><p style="font-size:12px;color:var(--text-secondary);margin-top:4px">掌握度: ${(p*100).toFixed(0)}%</p></div>`;
  }
  html += '</div>';
  if (!Object.keys(states).length) html += '<p style="color:var(--text-secondary)">还没有学习记录，去 AI 对话中做几道题吧。</p>';
  document.getElementById('progressContent').innerHTML = html;
}

// ── TV Mode ──
document.getElementById('tvModeBtn').addEventListener('click', () => {
  document.getElementById('app').classList.toggle('tv-mode');
  document.getElementById('tvModeBtn').textContent = document.getElementById('app').classList.contains('tv-mode') ? '退出 TV 模式' : 'TV 模式';
});

// ── Download TV ──
document.getElementById('downloadTvBtn').addEventListener('click', () => {
  window.open('/tv.html', '_blank');
});

// ── Init ──
document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.view));
});
navigate('chat');
</script>
</body>
</html>
