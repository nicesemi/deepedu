<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepEdu School - TV</title>
<style>
  :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-card: #334155;
    --bg-card-hover: #475569;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.4);
    --border: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    display: flex; flex-direction: column;
  }
  .header {
    padding: 20px 32px 16px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; }
  .header .subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

  .skill-tags {
    display: flex; gap: 12px; padding: 16px 32px;
    background: var(--bg-secondary); flex-wrap: wrap; flex-shrink: 0;
  }
  .skill-tag {
    background: var(--bg-card); color: var(--text-primary);
    border: 2px solid transparent; padding: 10px 20px; border-radius: 24px;
    font-size: 16px; cursor: pointer; transition: all 0.2s; outline: none;
  }
  .skill-tag:hover, .skill-tag:focus {
    border-color: var(--accent); background: var(--bg-card-hover);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .skill-tag.active { border-color: var(--accent); background: var(--accent); }

  .app-bar-section {
    padding: 12px 32px; background: var(--bg-secondary);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .app-bar-label {
    color: var(--text-secondary); font-size: 13px; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 10px;
  }
  .app-bar { display: flex; gap: 16px; }
  .app-card {
    flex: 1; min-width: 200px; max-width: 280px;
    background: var(--bg-card); border: 2px solid transparent;
    border-radius: 14px; padding: 18px; cursor: pointer;
    transition: all 0.25s; outline: none; display: flex;
    flex-direction: column; gap: 8px; position: relative;
    text-decoration: none; color: var(--text-primary);
  }
  .app-card:hover, .app-card:focus {
    border-color: var(--accent); background: var(--bg-card-hover);
    box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px);
  }
  .app-card .app-icon {
    font-size: 28px; width: 44px; height: 44px;
    background: rgba(59,130,246,0.15); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .app-card .app-name { font-size: 16px; font-weight: 600; line-height: 1.3; }
  .app-card .app-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .app-card .app-badge {
    font-size: 11px; background: rgba(59,130,246,0.2);
    color: var(--accent); padding: 3px 10px; border-radius: 10px; align-self: flex-start;
  }

  .main-content { flex: 1; display: flex; padding: 0; gap: 0; min-height: 0; }
  .chat-area {
    flex: 1; padding: 24px 32px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
    border-right: 1px solid var(--border);
  }
  .iframe-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
  .iframe-area.hidden { display: none; }
  .iframe-area iframe {
    flex: 1; border: none; width: 100%; height: 100%; background: #fff;
  }
  .iframe-header {
    padding: 10px 16px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border); display: flex;
    align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .iframe-title { font-size: 14px; font-weight: 600; }
  .iframe-close {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-size: 13px; outline: none;
  }
  .iframe-close:hover, .iframe-close:focus {
    border-color: var(--accent); background: var(--bg-card-hover);
  }
  .welcome { color: var(--text-secondary); text-align: center; margin-top: 60px; }
  .welcome h2 { color: var(--text-primary); margin-bottom: 8px; }

  @media (max-width: 900px) {
    .app-bar { flex-wrap: wrap; }
    .app-card { min-width: 150px; flex: 1 1 45%; }
    .main-content { flex-direction: column; }
    .chat-area { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>DeepEdu School</h1>
  <p class="subtitle">AI 驱动的个性化教育平台 · TV 模式</p>
</div>

<div class="skill-tags" id="skillTags">
  <button class="skill-tag active" data-skill="math" tabindex="0">数学辅导</button>
  <button class="skill-tag" data-skill="english" tabindex="0">英语听说</button>
  <button class="skill-tag" data-skill="science" tabindex="0">科学实验</button>
  <button class="skill-tag" data-skill="coding" tabindex="0">编程入门</button>
  <button class="skill-tag" data-skill="general" tabindex="0">通用知识</button>
</div>

<div class="app-bar-section">
  <p class="app-bar-label">教育应用</p>
  <div class="app-bar" id="appBar">
    <a class="app-card" href="#" data-url="https://math-knowledge-graph.vercel.app" data-name="数学知识图谱" tabindex="0" role="button">
      <div class="app-icon">&#128208;</div>
      <div class="app-name">数学知识图谱</div>
      <div class="app-desc">交互式数学概念关系图，探索知识点之间的深层联系</div>
      <span class="app-badge">数学辅导</span>
    </a>
    <a class="app-card" href="#" data-url="https://up-sage.vercel.app" data-name="English Level Up" tabindex="0" role="button">
      <div class="app-icon">&#128483;&#65039;</div>
      <div class="app-name">English Level Up</div>
      <div class="app-desc">英语听说训练，分级提升语言能力</div>
      <span class="app-badge">英语听说</span>
    </a>
    <a class="app-card" href="#" data-url="https://edulab-pi.vercel.app" data-name="edulab 数学课件" tabindex="0" role="button">
      <div class="app-icon">&#128302;</div>
      <div class="app-name">edulab 数学课件</div>
      <div class="app-desc">3D 几何可视化课件，沉浸式数学学习体验</div>
      <span class="app-badge">数学辅导</span>
    </a>
    <a class="app-card" href="#" data-url="https://marble-taxonomy-explorer.vercel.app" data-name="os-taxonomy 知识图谱" tabindex="0" role="button">
      <div class="app-icon">&#129504;</div>
      <div class="app-name">os-taxonomy</div>
      <div class="app-desc">通用分类学知识图谱探索器</div>
      <span class="app-badge">通用知识</span>
    </a>
  </div>
</div>

<div class="main-content">
  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <h2>欢迎使用 DeepEdu School</h2>
      <p>选择上方技能标签开始对话，或点击教育应用卡片在右侧面板打开</p>
    </div>
  </div>
  <div class="iframe-area hidden" id="iframeArea">
    <div class="iframe-header">
      <span class="iframe-title" id="iframeTitle">应用预览</span>
      <button class="iframe-close" id="iframeClose" tabindex="0">关闭</button>
    </div>
    <iframe id="appFrame" src="" allow="camera;microphone;fullscreen"></iframe>
  </div>
</div>

<script>
  const skillTags = document.querySelectorAll('.skill-tag');
  skillTags.forEach(tag => {
    tag.addEventListener('click', () => {
      skillTags.forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
    });
  });

  const appCards = document.querySelectorAll('.app-card');
  const iframeArea = document.getElementById('iframeArea');
  const appFrame = document.getElementById('appFrame');
  const iframeTitle = document.getElementById('iframeTitle');
  const iframeClose = document.getElementById('iframeClose');
  const chatArea = document.getElementById('chatArea');

  appCards.forEach(card => {
    card.addEventListener('click', (e) => {
      e.preventDefault();
      openApp(card.getAttribute('data-url'), card.getAttribute('data-name'));
    });
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });
  });

  function openApp(url, name) {
    appFrame.src = url;
    iframeTitle.textContent = name;
    iframeArea.classList.remove('hidden');
    chatArea.style.flex = '0.4';
  }

  iframeClose.addEventListener('click', () => {
    appFrame.src = '';
    iframeArea.classList.add('hidden');
    chatArea.style.flex = '1';
  });
  iframeClose.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); iframeClose.click(); }
  });

  // TV remote arrow key navigation
  const allCards = Array.from(appCards);
  const skillTagEls = Array.from(skillTags);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
      const ac = document.activeElement;
      if (allCards.includes(ac)) {
        const idx = allCards.indexOf(ac);
        const n = e.key === 'ArrowRight' ? idx + 1 : idx - 1;
        if (n >= 0 && n < allCards.length) { e.preventDefault(); allCards[n].focus(); }
      } else if (skillTagEls.includes(ac)) {
        const idx = skillTagEls.indexOf(ac);
        const n = e.key === 'ArrowRight' ? idx + 1 : idx - 1;
        if (n >= 0 && n < skillTagEls.length) { e.preventDefault(); skillTagEls[n].focus(); }
      }
    }
    if (e.key === 'ArrowDown') {
      if (document.activeElement && skillTagEls.includes(document.activeElement)) {
        e.preventDefault(); allCards[0].focus();
      }
    }
    if (e.key === 'ArrowUp') {
      if (document.activeElement && allCards.includes(document.activeElement)) {
        e.preventDefault(); skillTagEls[0].focus();
      }
    }
  });
</script>

</body>
</html>
